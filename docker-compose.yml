version: '3.8'

services:
  # ========================================
  # BANCOS DE DADOS POSTGRESQL
  # ========================================
  
  # PostgreSQL - Usuários
  postgres-usuarios:
    image: postgres:15-alpine
    container_name: postgres-usuarios
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: usuarios
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    volumes:
      - usuarios-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d usuarios"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-network

  # PostgreSQL - Produtos (Master)
  postgres-produtos-master:
    image: postgres:15-alpine
    container_name: postgres-produtos-master
    ports:
      - "5435:5432"
    environment:
      POSTGRES_DB: produtos
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    volumes:
      - produtos-master-data:/var/lib/postgresql/data
      - ./docker/postgres/init-replication.sh:/docker-entrypoint-initdb.d/init-replication.sh
    command: 
      - "postgres"
      - "-c"
      - "wal_level=replica"
      - "-c"
      - "max_wal_senders=3"
      - "-c"
      - "max_replication_slots=3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d produtos"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-network

  # PostgreSQL - Produtos (Replica)
  postgres-produtos-replica:
    image: postgres:15-alpine
    container_name: postgres-produtos-replica
    ports:
      - "5437:5432"
    environment:
      POSTGRES_DB: produtos
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_MASTER_HOST: postgres-produtos-master
    volumes:
      - produtos-replica-data:/var/lib/postgresql/data
    depends_on:
      postgres-produtos-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d produtos"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-network

  # PostgreSQL - Vendas
  postgres-vendas:
    image: postgres:15-alpine
    container_name: postgres-vendas
    ports:
      - "5436:5432"
    environment:
      POSTGRES_DB: vendas
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    volumes:
      - vendas-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d vendas"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-network

  # ========================================
  # REDIS CACHE
  # ========================================
  
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass redis123
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-network

  # ========================================
  # KAFKA + ZOOKEEPER
  # ========================================
  
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-logs:/var/lib/zookeeper/log
    networks:
      - ecommerce-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9093,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/var/lib/kafka/data
    depends_on:
      - zookeeper
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - ecommerce-network

  # Kafka UI (opcional - para visualizar tópicos)
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8089:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9093
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    depends_on:
      - kafka
    networks:
      - ecommerce-network

  # ========================================
  # RABBITMQ
  # ========================================
  
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: rabbitmq
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - ecommerce-network

  # ========================================
  # OBSERVABILIDADE - PROMETHEUS
  # ========================================
  
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - ecommerce-network

  # ========================================
  # OBSERVABILIDADE - GRAFANA
  # ========================================
  
  grafana:
    image: grafana/grafana:10.2.2
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_INSTALL_PLUGINS=grafana-clock-panel
    volumes:
      - grafana-data:/var/lib/grafana
      - ./docker/grafana/datasources:/etc/grafana/provisioning/datasources
      - ./docker/grafana/dashboards:/etc/grafana/provisioning/dashboards
    depends_on:
      - prometheus
      - loki
    networks:
      - ecommerce-network

  # ========================================
  # OBSERVABILIDADE - LOKI
  # ========================================
  
  loki:
    image: grafana/loki:2.9.3
    container_name: loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./docker/loki/loki-config.yml:/etc/loki/local-config.yaml
      - loki-data:/loki
    networks:
      - ecommerce-network

  # ========================================
  # OBSERVABILIDADE - PROMTAIL
  # ========================================
  
  promtail:
    image: grafana/promtail:2.9.3
    container_name: promtail
    volumes:
      - ./docker/promtail/promtail-config.yml:/etc/promtail/config.yml
      - /var/log:/var/log:ro
      - ./logs:/app/logs:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - ecommerce-network

  # ========================================
  # OBSERVABILIDADE - JAEGER
  # ========================================
  
  jaeger:
    image: jaegertracing/all-in-one:1.51
    container_name: jaeger
    ports:
      - "5775:5775/udp"   # accept zipkin.thrift over compact thrift protocol
      - "6831:6831/udp"   # accept jaeger.thrift over compact thrift protocol
      - "6832:6832/udp"   # accept jaeger.thrift over binary thrift protocol
      - "5778:5778"       # serve configs
      - "16686:16686"     # serve frontend (UI)
      - "14268:14268"     # accept jaeger.thrift directly from clients
      - "14250:14250"     # accept model.proto (gRPC)
      - "9411:9411"       # Zipkin compatible endpoint
    environment:
      - COLLECTOR_ZIPKIN_HOST_PORT=:9411
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - ecommerce-network

  # ========================================
  # EXPORTERS PARA MÉTRICAS
  # ========================================
  
  # PostgreSQL Exporter (para Prometheus)
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: postgres-exporter
    ports:
      - "9187:9187"
    environment:
      DATA_SOURCE_NAME: "postgresql://admin:admin123@postgres-produtos-master:5432/produtos?sslmode=disable"
    depends_on:
      - postgres-produtos-master
    networks:
      - ecommerce-network

  # Redis Exporter (para Prometheus)
  redis-exporter:
    image: oliver006/redis_exporter:v1.55.0-alpine
    container_name: redis-exporter
    ports:
      - "9121:9121"
    environment:
      REDIS_ADDR: "redis://redis:6379"
      REDIS_PASSWORD: "redis123"
    depends_on:
      - redis
    networks:
      - ecommerce-network

  # ========================================
  # APLICAÇÃO - MICROSSERVIÇOS JAVA (PERFIL)
  # ========================================

  usuarios-service:
    profiles: ["apps"]
    build:
      context: ./usuarios
      dockerfile: Dockerfile
    container_name: usuarios-service
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-usuarios:5432/usuarios
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin123
      APP_CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:8080
    depends_on:
      postgres-usuarios:
        condition: service_healthy
    networks:
      - ecommerce-network

  produtos-write-service:
    profiles: ["apps"]
    build:
      context: ./produtos-write-service
      dockerfile: Dockerfile
    container_name: produtos-write-service
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-produtos-master:5432/produtos
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin123
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: admin
      SPRING_RABBITMQ_PASSWORD: admin123
    depends_on:
      postgres-produtos-master:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - ecommerce-network

  produtos-read-service:
    profiles: ["apps"]
    build:
      context: ./produtos-read-service
      dockerfile: Dockerfile
    container_name: produtos-read-service
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-produtos-replica:5432/produtos
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin123
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: redis123
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: admin
      SPRING_RABBITMQ_PASSWORD: admin123
    depends_on:
      postgres-produtos-replica:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - ecommerce-network

  vendas-service:
    profiles: ["apps"]
    build:
      context: ./vendas
      dockerfile: Dockerfile
    container_name: vendas-service
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-vendas:5432/vendas
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin123
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9093
      SERVICES_PRODUTOS_URL: http://produtos-read-service:8082
    depends_on:
      postgres-vendas:
        condition: service_healthy
      kafka:
        condition: service_healthy
      produtos-read-service:
        condition: service_started
    networks:
      - ecommerce-network

# ========================================
# VOLUMES
# ========================================

volumes:
  # PostgreSQL
  usuarios-data:
    driver: local
  produtos-master-data:
    driver: local
  produtos-replica-data:
    driver: local
  vendas-data:
    driver: local
  
  # Redis
  redis-data:
    driver: local
  
  # Kafka
  zookeeper-data:
    driver: local
  zookeeper-logs:
    driver: local
  kafka-data:
    driver: local
  
  # RabbitMQ
  rabbitmq-data:
    driver: local
  
  # Observabilidade
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  loki-data:
    driver: local

# ========================================
# NETWORK
# ========================================

networks:
  ecommerce-network:
    driver: bridge
