name: Security Scan

on:
  schedule:
    # Roda todos os dias às 2h da manhã
    - cron: '0 2 * * *'
  push:
    branches: [ main, develop ]

jobs:
  dependency-check:
    name: Dependency Security Check
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        service: [usuarios, produtos-write-service, produtos-read-service, vendas]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Run OWASP Dependency Check
        working-directory: ./${{ matrix.service }}
        run: |
          mvn org.owasp:dependency-check-maven:check
      
      - name: Upload results
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: ./${{ matrix.service }}/target/dependency-check-report.sarif

  trivy-scan:
    name: Container Security Scan
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        image: 
          - usuarios
          - produtos-write
          - produtos-read
          - vendas
          - frontend
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ghcr.io/${{ github.repository_owner }}/venda-distribuida-${{ matrix.image }}:latest'
          format: 'sarif'
          output: 'trivy-results.sarif'
      
      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
