name: CI/CD Pipeline – Venda Distribuída

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/venda-distribuida

# ─────────────────────────────────────────────────────────────────────────────
# Pipeline: lint → build → unit-tests (≥80%) → integration-tests → sonar → docker → deploy
# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ═══════════════════════════════════════════════════════════════
  # STAGE 1 – LINT
  # Java: Checkstyle  |  Frontend: ESLint
  # ═══════════════════════════════════════════════════════════════

  lint-java:
    name: "🔍 Lint · ${{ matrix.service }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: usuarios
            java: "21"
          - service: produtos-write-service
            java: "25"
          - service: produtos-read-service
            java: "25"
          - service: vendas
            java: "25"
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
          cache: maven

      - name: Checkstyle
        working-directory: ./${{ matrix.service }}
        run: mvn checkstyle:check -q

  lint-frontend:
    name: "🔍 Lint · frontend"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ./frontend/package-lock.json

      - run: npm ci
      - run: npm run lint

  # ═══════════════════════════════════════════════════════════════
  # STAGE 2 – BUILD  (compile only – sem testes)
  # ═══════════════════════════════════════════════════════════════

  build-java:
    name: "🏗️ Build · ${{ matrix.service }}"
    needs: lint-java
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: usuarios
            java: "21"
          - service: produtos-write-service
            java: "25"
          - service: produtos-read-service
            java: "25"
          - service: vendas
            java: "25"
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
          cache: maven

      - name: Compile
        working-directory: ./${{ matrix.service }}
        run: mvn clean compile -q

  build-frontend:
    name: "🏗️ Build · frontend"
    needs: lint-frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ./frontend/package-lock.json

      - run: npm ci
      - run: npm run build

  # ═══════════════════════════════════════════════════════════════
  # STAGE 3 – UNIT TESTS + COVERAGE GATE ≥ 80 %
  # JaCoCo enforce line coverage mínimo de 80 %
  # ═══════════════════════════════════════════════════════════════

  unit-tests:
    name: "🧪 Unit Tests · ${{ matrix.service }}"
    needs: build-java
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: usuarios
            java: "21"
          - service: produtos-write-service
            java: "25"
          - service: produtos-read-service
            java: "25"
          - service: vendas
            java: "25"
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
          cache: maven

      - name: Run unit tests + coverage gate (≥ 80 %)
        working-directory: ./${{ matrix.service }}
        run: mvn test jacoco:report jacoco:check -q

      - name: Upload JaCoCo XML (para Sonar)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-${{ matrix.service }}
          path: ./${{ matrix.service }}/target/site/jacoco/jacoco.xml
          retention-days: 7

      - name: Upload coverage → Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: ./${{ matrix.service }}/target/site/jacoco/jacoco.xml
          flags: ${{ matrix.service }}
          token: ${{ secrets.CODECOV_TOKEN }}

  # ═══════════════════════════════════════════════════════════════
  # STAGE 4 – INTEGRATION TESTS
  # Serviços: PostgreSQL, RabbitMQ, Redis, Kafka
  # Maven Failsafe executa classes *IT.java
  # ═══════════════════════════════════════════════════════════════

  integration-tests:
    name: "🔗 Integration Tests · ${{ matrix.service }}"
    needs: unit-tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: usuarios
            java: "21"
          - service: produtos-write-service
            java: "25"
          - service: produtos-read-service
            java: "25"
          - service: vendas
            java: "25"

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      rabbitmq:
        image: rabbitmq:3.13-alpine
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      kafka:
        image: bitnami/kafka:3
        ports:
          - 9092:9092
        env:
          KAFKA_CFG_NODE_ID: "0"
          KAFKA_CFG_PROCESS_ROLES: "controller,broker"
          KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
          KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
          KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "0@127.0.0.1:9093"
          KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
          ALLOW_PLAINTEXT_LISTENER: "yes"

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
          cache: maven

      - name: Run integration tests
        working-directory: ./${{ matrix.service }}
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/testdb
          SPRING_DATASOURCE_USERNAME: test
          SPRING_DATASOURCE_PASSWORD: test
          SPRING_RABBITMQ_HOST: localhost
          SPRING_DATA_REDIS_HOST: localhost
          SPRING_KAFKA_BOOTSTRAP_SERVERS: localhost:9092
        run: mvn failsafe:integration-test failsafe:verify -q

  # ═══════════════════════════════════════════════════════════════
  # STAGE 5 – SONAR + QUALITY GATE
  # Requer: SONAR_TOKEN (secret) e SONAR_ORG (variable)
  # Bloqueia o pipeline se o quality gate falhar
  # ═══════════════════════════════════════════════════════════════

  sonar:
    name: "📊 Sonar Quality Gate · ${{ matrix.service }}"
    needs: [unit-tests, integration-tests]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: usuarios
            java: "21"
          - service: produtos-write-service
            java: "25"
          - service: produtos-read-service
            java: "25"
          - service: vendas
            java: "25"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0      # shallow clone desabilitado para análise completa

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
          cache: maven

      - name: Download JaCoCo report
        uses: actions/download-artifact@v4
        with:
          name: jacoco-${{ matrix.service }}
          path: ./${{ matrix.service }}/target/site/jacoco/

      - name: SonarCloud scan + quality gate
        working-directory: ./${{ matrix.service }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=venda-distribuida-${{ matrix.service }} \
            -Dsonar.organization=${{ vars.SONAR_ORG }} \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml \
            -Dsonar.qualitygate.wait=true \
            -q

  # ═══════════════════════════════════════════════════════════════
  # STAGE 6 – DOCKER BUILD & PUSH
  # Executa somente em push (não em PRs)
  # ═══════════════════════════════════════════════════════════════

  docker-push:
    name: "🐳 Docker · ${{ matrix.service }}"
    needs: sonar
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    strategy:
      matrix:
        include:
          - service: usuarios
            context: ./usuarios
          - service: produtos-write
            context: ./produtos-write-service
          - service: produtos-read
            context: ./produtos-read-service
          - service: vendas
            context: ./vendas
          - service: frontend
            context: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ═══════════════════════════════════════════════════════════════
  # STAGE 7 – DEPLOY
  # Code review obrigatório via branch protection + CODEOWNERS
  # ═══════════════════════════════════════════════════════════════

  deploy-staging:
    name: "🚀 Deploy · Staging"
    needs: docker-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: https://staging.vendadistribuida.com
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to staging
        run: |
          echo "🚀 Deploying to staging environment..."
          # Adicione aqui: SSH, docker-compose pull && up, kubectl, etc.

  deploy-production:
    name: "🚀 Deploy · Production"
    needs: docker-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://vendadistribuida.com
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to production
        run: |
          echo "🚀 Deploying to production environment..."
          # Adicione aqui: SSH, docker-compose pull && up, kubectl, etc.
